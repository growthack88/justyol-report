<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustYol — Performance Report &amp; Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161A; --paper:#F4F2EC; --ink:#16181D; --muted:#9A9E9A;
    --blue:#2E4BD8; --blue-soft:#8AA0FF; --line:#2A2D35; --red:#D8412F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--paper);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink)}

  /* ---------- GATE ---------- */
  #gate{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;
    background:radial-gradient(circle at 70% -10%,rgba(46,75,216,.45),transparent 55%),var(--bg);
    padding:24px}
  .gatecard{width:100%;max-width:380px;text-align:center;color:#fff}
  .glogo{width:54px;height:54px;border-radius:14px;background:var(--blue);color:#fff;display:grid;place-items:center;
    font-family:'Space Grotesk';font-weight:700;font-size:22px;margin:0 auto 22px;box-shadow:0 10px 30px -10px rgba(46,75,216,.7)}
  .gatecard h1{font-family:'Space Grotesk';font-weight:600;font-size:24px;letter-spacing:-.01em;margin-bottom:6px}
  .gatecard .eyebrow{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue-soft);margin-bottom:18px}
  .gatecard p.sub{font-size:13.5px;color:#B8BCC4;margin-bottom:24px;line-height:1.5}
  .pwrow{display:flex;gap:8px}
  #pw{flex:1;font-family:'IBM Plex Mono';font-size:15px;padding:13px 15px;border-radius:11px;border:1px solid var(--line);
    background:#1D2027;color:#fff;outline:none;transition:.15s}
  #pw:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,75,216,.25)}
  #go{font-family:'Space Grotesk';font-weight:600;font-size:15px;padding:13px 20px;border:none;border-radius:11px;
    background:var(--blue);color:#fff;cursor:pointer;transition:.15s}
  #go:hover{background:#2540c4}
  #go:disabled{opacity:.55;cursor:wait}
  #err{color:#FF8A7A;font-family:'IBM Plex Mono';font-size:12px;margin-top:14px;min-height:16px;opacity:0;transition:.2s}
  #err.show{opacity:1}
  .gatefoot{margin-top:30px;font-family:'IBM Plex Mono';font-size:10.5px;color:#62656C;letter-spacing:.04em}
  .lock{display:inline-block;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* ---------- APP ---------- */
  #app{display:none;flex-direction:column;height:100vh}
  #app.on{display:flex}
  .appbar{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--bg);color:#fff;flex:0 0 auto;
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  .appbar .b{display:flex;align-items:center;gap:10px}
  .appbar .l{width:30px;height:30px;border-radius:8px;background:var(--blue);display:grid;place-items:center;
    font-family:'Space Grotesk';font-weight:700;font-size:14px}
  .appbar .nm{font-family:'Space Grotesk';font-weight:600;font-size:15px;line-height:1}
  .appbar .sb{font-family:'IBM Plex Mono';font-size:10px;color:var(--muted)}
  .appbar .sp{flex:1}
  .seg{display:flex;gap:3px;background:#1D2027;border:1px solid var(--line);border-radius:11px;padding:3px}
  .seg button{font-family:'Inter';font-weight:600;font-size:13px;border:none;background:none;color:var(--muted);
    padding:8px 16px;border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
  .seg button.on{background:var(--blue);color:#fff}
  .frames{flex:1;position:relative;min-height:0}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#FBFAF7}
  .frames iframe.on{display:block}
  @media(max-width:560px){.appbar .sb{display:none}.seg button{padding:8px 12px}}
</style>
</head>
<body>

<div id="gate">
  <div class="gatecard">
    <div class="glogo">JY</div>
    <div class="eyebrow">Confidential · Encrypted</div>
    <h1>JustYol Performance</h1>
    <p class="sub">Store, market &amp; product analysis with a live interactive dashboard. This report is encrypted — enter the password to unlock.</p>
    <form class="pwrow" id="form" autocomplete="off">
      <input id="pw" type="password" placeholder="Password" autocomplete="off" autofocus>
      <button id="go" type="submit">Unlock</button>
    </form>
    <div id="err"></div>
    <div class="gatefoot"><span class="lock">●</span> AES-256 client-side encryption · prepared by mahmoudomar.com</div>
  </div>
</div>

<div id="app">
  <div class="appbar">
    <div class="b"><div class="l">JY</div><div><div class="nm">JustYol</div><div class="sb">justyol.com · Morocco · MAD</div></div></div>
    <div class="sp"></div>
    <div class="seg" id="seg">
      <button data-v="report" class="on">📄 Executive Report</button>
      <button data-v="dash">📊 Live Dashboard</button>
    </div>
  </div>
  <div class="frames">
    <iframe id="f-report" class="on" title="Executive Report"></iframe>
    <iframe id="f-dash" title="Live Dashboard"></iframe>
  </div>
</div>

  iter: 250000

const b64ToBuf = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function unlock(pw){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64ToBuf(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const plainBuf = await crypto.subtle.decrypt(
    { name:'AES-GCM', iv:b64ToBuf(PAYLOAD.iv) }, key, b64ToBuf(PAYLOAD.data)
  );
  return JSON.parse(new TextDecoder().decode(plainBuf));
}

const form = document.getElementById('form');
const pw   = document.getElementById('pw');
const go   = document.getElementById('go');
const err  = document.getElementById('err');

form.addEventListener('submit', async e => {
  e.preventDefault();
  err.classList.remove('show');
  go.disabled = true; go.textContent = 'Decrypting…';
  try {
    const docs = await unlock(pw.value);
    document.getElementById('f-report').srcdoc = docs.report;
    document.getElementById('f-dash').srcdoc   = docs.dashboard;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').classList.add('on');
  } catch(_) {
    go.disabled = false; go.textContent = 'Unlock';
    err.textContent = 'Wrong password — try again.';
    err.classList.add('show');
    pw.value = ''; pw.focus();
  }
});

// view toggle
document.getElementById('seg').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  const v = b.dataset.v;
  document.getElementById('f-report').classList.toggle('on', v==='report');
  document.getElementById('f-dash').classList.toggle('on', v==='dash');
});
</script>
